name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'tests/playwright/**'
      - 'tests/artifacts/**'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'tests/playwright/**'
      - 'tests/artifacts/**'
      - '.claude/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets 2>&1 | tee /tmp/clippy.out; echo "Clippy warnings (non-blocking for now)"

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --lib --bins

  deploy-staging:
    name: Deploy to Staging (Node B)
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.OVH_NODE_B_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to staging
        timeout-minutes: 45
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=6 root@${{ secrets.OVH_NODE_B_HOST }} '
            set -euo pipefail
            cd /opt/choiros/workspace
            LOG=/tmp/deploy-$(date +%s).log

            echo "==> Pulling latest code"
            git pull --ff-only origin main

            echo "==> Resetting stale systemd units"
            systemctl reset-failed nixos-rebuild-switch-to-configuration.service 2>/dev/null || true

            echo "==> Pre-building NixOS closure (catches OOM before switch)"
            nix build .#nixosConfigurations.choiros-b.config.system.build.toplevel --print-build-logs >>"$LOG" 2>&1
            echo "    Pre-build complete ($(wc -l < "$LOG") log lines)"

            echo "==> Activating NixOS config"
            nixos-rebuild switch --flake .#choiros-b --print-build-logs >>"$LOG" 2>&1
            echo "    Switch complete"

            echo "==> Waiting for hypervisor"
            sleep 2
            curl -fsS --retry 10 --retry-delay 3 --retry-all-errors http://127.0.0.1:9090/login > /dev/null

            echo "==> Staging deploy complete"
          '

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
