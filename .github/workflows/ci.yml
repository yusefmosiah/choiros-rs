name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --lib --bins

  build:
    name: Nix build (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - package: sandbox
            flake_ref: ./sandbox#sandbox
          - package: hypervisor
            flake_ref: ./hypervisor#hypervisor
          - package: desktop
            flake_ref: ./dioxus-desktop#desktop
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Configure FlakeHub cache
        uses: DeterminateSystems/flakehub-cache-action@v3
        with:
          flakehub-flake-name: choir/choiros-rs
        env:
          FLAKEHUB_AUTH_TOKEN: ${{ secrets.FLAKEHUB_AUTH_TOKEN }}

      - name: Build ${{ matrix.package }}
        run: nix build ${{ matrix.flake_ref }} --print-build-logs

  deploy:
    name: Deploy to Node A
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.OVH_NODE_A_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.OVH_NODE_A_HOST }} '
            set -euo pipefail
            cd /opt/choiros/workspace

            echo "==> Pulling latest code"
            git pull --ff-only origin main

            echo "==> Building sandbox"
            nix build ./sandbox#sandbox -o result-sandbox --print-build-logs

            echo "==> Building hypervisor"
            nix build ./hypervisor#hypervisor -o result-hypervisor --print-build-logs

            echo "==> Installing binaries"
            cp -f result-sandbox/bin/sandbox /opt/choiros/bin/sandbox
            cp -f result-hypervisor/bin/hypervisor /opt/choiros/bin/hypervisor
            cp -f scripts/ops/ovh-runtime-ctl.sh /opt/choiros/bin/ovh-runtime-ctl
            chmod +x /opt/choiros/bin/ovh-runtime-ctl

            echo "==> Restarting services"
            systemctl restart hypervisor

            echo "==> Waiting for health"
            sleep 3
            curl -fsS --retry 5 --retry-delay 2 http://127.0.0.1:9090/login > /dev/null
            echo "==> Deploy complete"
          '

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
