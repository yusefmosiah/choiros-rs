name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'tests/playwright/**'
      - 'tests/artifacts/**'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'tests/playwright/**'
      - 'tests/artifacts/**'
      - '.claude/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets 2>&1 | tee /tmp/clippy.out; echo "Clippy warnings (non-blocking for now)"

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --lib --bins

  deploy-staging:
    name: Deploy to Staging (Node B)
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.OVH_NODE_B_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to staging
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.OVH_NODE_B_HOST }} '
            set -euo pipefail
            cd /opt/choiros/workspace

            echo "==> Pulling latest code"
            git pull --ff-only origin main

            echo "==> Resetting stale systemd units"
            systemctl reset-failed nixos-rebuild-switch-to-configuration.service 2>/dev/null || true

            echo "==> Pre-building NixOS closure (catches OOM before switch)"
            nix build .#nixosConfigurations.choiros-b.config.system.build.toplevel --print-build-logs 2>&1

            echo "==> Activating NixOS config"
            nixos-rebuild switch --flake .#choiros-b --print-build-logs 2>&1

            echo "==> Waiting for hypervisor"
            sleep 2
            curl -fsS --retry 10 --retry-delay 3 --retry-all-errors http://127.0.0.1:9090/login > /dev/null

            echo "==> Staging deploy complete"
          '

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key

  e2e-staging:
    name: E2E Tests on Staging
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: tests/playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run E2E against staging
        working-directory: tests/playwright
        env:
          PLAYWRIGHT_HYPERVISOR_BASE_URL: https://draft.choir-ip.com
          PLAYWRIGHT_SANDBOX_BASE_URL: https://draft.choir-ip.com
        run: npx playwright test --project=hypervisor --reporter=list,html
        continue-on-error: true

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-staging-results
          path: |
            tests/artifacts/playwright/html-report/
            tests/artifacts/playwright/test-results/
          retention-days: 14
